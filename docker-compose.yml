services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url-shortener-app
    ports:
      - "5000:5000"
    environment:
      APP_PORT: "5000"
      APP_BASE_URL: "http://localhost:5000"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
